<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WOKER - Work Tracker for Lawyer</title>
    
    <!-- App-like Metadata for iPhone/Mac -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Woker">
    <meta name="theme-color" content="#0f0e32">
    
    <!-- Script Loaders -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'woker-legal-app';

        window.FB = { 
            db, auth, appId, collection, doc, addDoc, deleteDoc, onSnapshot, 
            query, signInAnonymously, signInWithCustomToken, onAuthStateChanged 
        };
    </script>

    <style>
        :root {
            --midnight-1: #2c2a7b;
            --midnight-2: #232162;
            --midnight-3: #1b194f;
            --midnight-4: #161440;
            --midnight-5: #0f0e32;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #fcfcfd; 
            color: #1e293b;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior: none;
        }
        .legal-card { 
            box-shadow: 0 4px 20px -5px rgb(0 0 0 / 0.1); 
            border: 1px solid #f1f5f9;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin-custom { animation: spin 1s linear infinite; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: var(--midnight-1); border-radius: 10px; }
        input, textarea, select { font-size: 16px !important; }
        .transition-standard { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const geminiApiKey = ""; 

        async function callGemini(prompt, systemInstruction = "") {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiApiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: systemInstruction ? { parts: [{ text: systemInstruction }] } : undefined
            };
            const maxRetries = 5;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text || "Maaf, gagal memproses analisis AI.";
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    const delay = Math.pow(2, i) * 1000;
                    await new Promise(res => setTimeout(res, delay));
                }
            }
        }

        const IconTrash = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        );

        function App() {
            const [isAuthReady, setIsAuthReady] = useState(false);
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('woker_access_key'));
            const [accessKey, setAccessKey] = useState(localStorage.getItem('woker_access_key') || '');
            const [userName, setUserName] = useState(localStorage.getItem('woker_user_name') || '');
            const [loginInput, setLoginInput] = useState('');
            const [entries, setEntries] = useState([]);
            const [formData, setFormData] = useState({ client: '', task: '', date: new Date().toISOString().split('T')[0], hours: '', associates: '' });
            const [currentMonth, setCurrentMonth] = useState(new Date().getMonth());
            const [currentYear, setCurrentYear] = useState(new Date().getFullYear());
            const [activeTab, setActiveTab] = useState('input');
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [aiAnalysis, setAiAnalysis] = useState(null);
            const [modalMessage, setModalMessage] = useState(null);
            const [isCloudSyncing, setIsCloudSyncing] = useState(false);

            const isValidFormat = useMemo(() => {
                const regex = /^[A-Z]{3}-[0-9]{4}$/i;
                return regex.test(loginInput);
            }, [loginInput]);

            useEffect(() => {
                const init = async () => {
                    if (!window.FB) return;
                    const { auth, signInAnonymously, signInWithCustomToken } = window.FB;
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                        setIsAuthReady(true);
                    } catch (e) {
                        setModalMessage("Koneksi cloud terhambat.");
                    }
                };
                init();
            }, []);

            useEffect(() => {
                if (!isAuthReady || !isLoggedIn || !accessKey || userName === '' || !window.FB) return;
                const { db, appId, collection, onSnapshot } = window.FB;
                setIsCloudSyncing(true);
                const safeKey = `data_${accessKey.trim().toLowerCase().replace(/[^a-z0-9]/g, '_')}`;
                const q = collection(db, 'artifacts', appId, 'public', 'data', safeKey);
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setEntries(data);
                    setIsCloudSyncing(false);
                }, () => setIsCloudSyncing(false));
                return () => unsubscribe();
            }, [isAuthReady, isLoggedIn, accessKey, userName]);

            const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

            const filteredEntries = useMemo(() => {
                return entries.filter(e => {
                    const d = new Date(e.date);
                    return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
                }).sort((a, b) => new Date(b.date) - new Date(a.date));
            }, [entries, currentMonth, currentYear]);

            const groupedEntries = useMemo(() => {
                const groups = {};
                filteredEntries.forEach(entry => {
                    if (!groups[entry.client]) groups[entry.client] = [];
                    groups[entry.client].push(entry);
                });
                return Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0]));
            }, [filteredEntries]);

            const totalHours = filteredEntries.reduce((sum, e) => sum + parseFloat(e.hours || 0), 0);

            const handleLogin = (e) => {
                e.preventDefault();
                if (!isValidFormat) return;
                const key = loginInput.trim().toUpperCase();
                const remember = e.target.remember.checked;
                setAccessKey(key);
                setIsLoggedIn(true);
                if (remember) localStorage.setItem('woker_access_key', key);
            };

            const handleSetName = (e) => {
                e.preventDefault();
                const name = e.target.username.value.trim();
                if (name.length < 2) return setModalMessage("Nama minimal 2 karakter.");
                setUserName(name);
                localStorage.setItem('woker_user_name', name);
            };

            const handleLogout = () => {
                if(!confirm("Anda akan keluar?")) return;
                localStorage.removeItem('woker_access_key');
                localStorage.removeItem('woker_user_name');
                setIsLoggedIn(false);
                setAccessKey('');
                setUserName('');
                setLoginInput('');
                setEntries([]);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!isLoggedIn) return;
                const { db, appId, collection, addDoc } = window.FB;
                const safeKey = `data_${accessKey.trim().toLowerCase().replace(/[^a-z0-9]/g, '_')}`;
                const newEntry = {
                    client: formData.client.toUpperCase(),
                    task: formData.task,
                    date: formData.date,
                    hours: parseFloat(formData.hours),
                    associates: formData.associates || '-',
                    author: userName,
                    createdAt: new Date().toISOString()
                };
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', safeKey), newEntry);
                    setFormData({ ...formData, client: '', task: '', hours: '', associates: '' });
                } catch (e) { setModalMessage("Gagal menyimpan."); }
            };

            const handleDelete = async (id) => {
                if (!confirm("Hapus entri?")) return;
                const { db, appId, doc, deleteDoc } = window.FB;
                const safeKey = `data_${accessKey.trim().toLowerCase().replace(/[^a-z0-9]/g, '_')}`;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', safeKey, id));
                } catch (e) { setModalMessage("Gagal menghapus."); }
            };

            const analyzeMonth = async () => {
                if (filteredEntries.length === 0) return;
                setIsAiLoading(true);
                try {
                    const tasksText = filteredEntries.map(e => `- ${e.client}: ${e.task} (${e.hours}h)`).join("\n");
                    const analysis = await callGemini(
                        `Daftar pekerjaan pengacara bulan ini:\n${tasksText}\n\nBuat ulasan profesional dalam 3 kalimat formal.`,
                        "Anda adalah penasihat hukum senior."
                    );
                    setAiAnalysis(analysis);
                } catch (e) { setModalMessage("Gagal memproses AI."); }
                finally { setIsAiLoading(false); }
            };

            const exportExcel = () => {
                if (filteredEntries.length === 0) return;
                const data = filteredEntries.map(e => ({ "Tanggal": e.date, "Klien": e.client, "Pekerjaan": e.task, "Rekan": e.associates, "Jam": e.hours }));
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Laporan");
                XLSX.writeFile(wb, `WOKER_${accessKey}_${months[currentMonth].toUpperCase()}.xlsx`);
            };

            if (!isLoggedIn) {
                return (
                    <div className="min-h-screen bg-white flex flex-col items-center justify-center p-4">
                        <div className="w-full max-w-md bg-white rounded-[3rem] overflow-hidden shadow-2xl">
                            <div className="bg-[#0f0e32] p-12 text-center text-white">
                                <span className="text-6xl font-black italic tracking-tighter uppercase">Woker</span>
                            </div>
                            <div className="p-8 pt-10">
                                <h2 className="text-4xl font-black text-slate-900 mb-2 uppercase">Hi, Wokers!</h2>
                                <p className="text-slate-500 font-medium text-sm mb-10">Masukkan Kode Rahasia anda.</p>
                                <form onSubmit={handleLogin} className="space-y-8">
                                    <input 
                                        name="specialCode" type="text" required value={loginInput}
                                        onChange={(e) => setLoginInput(e.target.value)}
                                        placeholder="XXX-0000" 
                                        className={`w-full p-6 bg-slate-50 border-2 rounded-[2rem] outline-none text-center font-black tracking-[0.2em] uppercase text-2xl ${loginInput && !isValidFormat ? 'border-red-400' : 'border-slate-100 focus:border-[#2c2a7b]'}`}
                                    />
                                    {loginInput && !isValidFormat && <p className="text-red-500 text-[10px] font-bold text-center italic">Format: 3 Huruf - 4 Angka (e.g. WKR-1234)</p>}
                                    <div className="flex justify-center">
                                        <label className="flex items-center gap-3 cursor-pointer">
                                            <input type="checkbox" name="remember" className="w-5 h-5 rounded accent-[#0f0e32]" defaultChecked />
                                            <span className="text-sm font-bold text-slate-500">Ingat Saya</span>
                                        </label>
                                    </div>
                                    <button type="submit" disabled={!isValidFormat} className={`w-full font-black py-6 rounded-[2rem] text-xs uppercase tracking-widest ${isValidFormat ? 'bg-[#0f0e32] text-white' : 'bg-slate-100 text-slate-300'}`}>Masuk</button>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase text-center mt-6 opacity-60 italic">KODE INI RAHASIA. MASUKKAN KODE PADA PERANGKAT LAINNYA UNTUK MASUK KE AKUN ANDA.</p>
                                </form>
                            </div>
                        </div>
                    </div>
                );
            }

            if (userName === '') {
                return (
                    <div className="min-h-screen bg-white flex flex-col items-center justify-center p-4">
                        <div className="w-full max-w-md bg-white rounded-[3rem] overflow-hidden shadow-2xl">
                            <div className="bg-[#0f0e32] p-12 text-center text-white"><h2 className="text-4xl font-black italic uppercase">Woker</h2></div>
                            <div className="p-10">
                                <h2 className="text-3xl font-black text-slate-900 mb-2 uppercase">Siapa Anda?</h2>
                                <p className="text-slate-500 font-medium text-sm mb-10">Masukkan nama lengkap atau inisial Anda.</p>
                                <form onSubmit={handleSetName} className="space-y-6">
                                    <input name="username" type="text" required placeholder="e.g. Bli Juan" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none text-center font-bold text-xl uppercase" />
                                    <button type="submit" className="w-full bg-[#0f0e32] text-white font-black py-5 rounded-2xl uppercase">SIMPAN</button>
                                </form>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col items-center w-full bg-[#fcfcfd]">
                    <header className="bg-[#0f0e32] text-white p-6 md:p-10 sticky top-0 z-50 w-full shadow-2xl flex flex-wrap justify-between items-center border-b border-[#232162]">
                        <div className="max-w-6xl mx-auto w-full flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <h1 className="text-3xl md:text-4xl font-black italic tracking-tighter uppercase leading-none">Woker</h1>
                                <p className="text-[10px] text-slate-400 uppercase tracking-[0.4em] font-bold mt-2 opacity-60">Work Tracker for Lawyer</p>
                            </div>
                            <div className="flex items-center gap-4 bg-[#161440] px-6 py-3 rounded-[2.5rem] border border-[#232162] shadow-inner">
                                <button onClick={() => currentMonth === 0 ? (setCurrentMonth(11), setCurrentYear(currentYear-1)) : setCurrentMonth(currentMonth-1)} className="text-slate-400 hover:text-white p-1 text-xl">❮</button>
                                <div className="text-center min-w-[150px]">
                                    <div className="text-lg font-black uppercase tracking-widest">{months[currentMonth]}</div>
                                    <div className="text-[10px] font-mono text-slate-500 font-bold">{currentYear}</div>
                                </div>
                                <button onClick={() => currentMonth === 11 ? (setCurrentMonth(0), setCurrentYear(currentYear+1)) : setCurrentMonth(currentMonth+1)} className="text-slate-400 hover:text-white p-1 text-xl">❯</button>
                            </div>
                        </div>
                    </header>

                    <main className="w-full max-w-6xl mt-8 px-4 md:px-10 pb-20">
                        <div className="mb-6 flex flex-wrap justify-between items-center px-6 py-4 bg-white border border-slate-100 rounded-[2rem] shadow-sm text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">
                            <div className="flex items-center gap-4">
                                <div className="flex items-center gap-2">
                                    <div className={`w-3 h-3 rounded-full ${isCloudSyncing ? 'bg-blue-400 animate-pulse' : 'bg-green-500 shadow-lg'}`}></div>
                                    <span className="text-[#0f0e32]">{userName}</span>
                                </div>
                                <span className="opacity-20">|</span>
                                <span>ID: {accessKey}</span>
                            </div>
                            <button onClick={handleLogout} className="text-red-500 hover:underline">Log Out</button>
                        </div>

                        <div className="flex bg-white rounded-[2.5rem] p-2 border border-slate-100 mb-10 font-bold shadow-sm">
                            <button onClick={() => setActiveTab('input')} className={`flex-1 py-4 rounded-[2rem] text-xs tracking-[0.2em] transition-standard ${activeTab === 'input' ? 'bg-[#0f0e32] text-white shadow-xl' : 'text-slate-400 hover:bg-slate-50'}`}>PEKERJAAN</button>
                            <button onClick={() => setActiveTab('rekap')} className={`flex-1 py-4 rounded-[2rem] text-xs tracking-[0.2em] transition-standard ${activeTab === 'rekap' ? 'bg-[#0f0e32] text-white shadow-xl' : 'text-slate-400 hover:bg-slate-50'}`}>RINGKASAN BULANAN</button>
                        </div>

                        {activeTab === 'input' ? (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                                <div className="lg:col-span-5">
                                    <form onSubmit={handleSubmit} className="bg-white p-10 rounded-[3rem] legal-card space-y-6 lg:sticky lg:top-44 border-t-[12px] border-t-[#2c2a7b]">
                                        <h3 className="font-black text-[#0f0e32] text-lg italic border-b pb-5 mb-2 uppercase tracking-tighter">Giat apa hari ini?</h3>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Klien / File Code</label>
                                            <input required type="text" value={formData.client} onChange={e => setFormData({...formData, client: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-[#2c2a7b] font-bold" placeholder="e.g. BANK INDONESIA" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Durasi (Jam)</label>
                                                <input required type="number" step="0.1" value={formData.hours} onChange={e => setFormData({...formData, hours: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold" placeholder="0.0" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Tanggal</label>
                                                <input required type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold" />
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Associates</label>
                                            <input type="text" value={formData.associates} onChange={e => setFormData({...formData, associates: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold" placeholder="e.g. Tana, Tini, Tunu" />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Detail Pekerjaan</label>
                                            <textarea required value={formData.task} onChange={e => setFormData({...formData, task: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none min-h-[140px] text-sm font-medium leading-relaxed" placeholder="Uraikan giat Anda hari ini..."></textarea>
                                        </div>
                                        <button className="w-full bg-[#0f0e32] hover:bg-[#161440] text-white font-black py-6 rounded-2xl shadow-xl transition-standard transform active:scale-[0.98] uppercase tracking-[0.2em] text-xs">Simpan Aktivitas</button>
                                    </form>
                                </div>
                                <div className="lg:col-span-7 space-y-6">
                                    <h3 className="font-black text-[#0f0e32] text-xs uppercase tracking-[0.3em] px-6">Log Aktivitas Terbaru</h3>
                                    {filteredEntries.map(entry => (
                                        <div key={entry.id} className="bg-white p-8 rounded-[3.5rem] border border-slate-100 shadow-sm flex items-start gap-8 group relative hover:border-[#2c2a7b]/30 transition-all duration-300">
                                            <div className="bg-[#0f0e32] text-white w-20 h-20 rounded-[2rem] flex flex-col items-center justify-center shrink-0 shadow-lg border border-[#232162]">
                                                <span className="text-3xl font-black leading-none">{new Date(entry.date).getDate()}</span>
                                                <span className="text-[9px] uppercase font-black opacity-40 mt-1 tracking-widest">{new Date(entry.date).toLocaleDateString('id-ID', {weekday:'short'})}</span>
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <div className="flex flex-wrap items-center gap-4 mb-3">
                                                    <span className="text-xl font-black text-[#2c2a7b] uppercase tracking-tight truncate">{entry.client}</span>
                                                    <span className="text-[11px] font-black text-slate-400 bg-slate-50 px-3 py-1 rounded-xl border border-slate-100">{entry.hours}h Kerja</span>
                                                </div>
                                                <p className="text-[15px] text-slate-700 font-medium mb-4 leading-relaxed">{entry.task}</p>
                                                <p className="text-[11px] font-black italic text-[#2c2a7b] opacity-60">Rekan: {entry.associates}</p>
                                            </div>
                                            <button onClick={() => handleDelete(entry.id)} className="text-slate-300 hover:text-red-500 p-4 transition-standard md:opacity-0 group-hover:opacity-100 rounded-2xl hover:bg-red-50"><IconTrash /></button>
                                        </div>
                                    ))}
                                    {filteredEntries.length === 0 && <div className="bg-slate-50/50 border-2 border-dashed border-slate-100 rounded-[4rem] p-32 text-center text-slate-300 font-black uppercase text-[11px] tracking-[0.4em] italic">Data Kosong</div>}
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-12 animate-in fade-in duration-500">
                                <div className="bg-gradient-to-br from-[#0f0e32] via-[#161440] to-[#232162] text-white p-14 md:p-20 rounded-[5rem] shadow-2xl flex flex-col md:flex-row justify-between items-center gap-12 border border-[#2c2a7b]/30 relative overflow-hidden text-center md:text-left">
                                    <div className="relative z-10">
                                        <p className="text-blue-200 text-[12px] font-black uppercase tracking-[0.5em] mb-6 opacity-80">Akumulasi Jam Kerja</p>
                                        <div className="text-9xl font-black tracking-tighter leading-none">{totalHours.toFixed(1)} <span className="text-3xl font-light text-slate-400 lowercase italic">h</span></div>
                                        <p className="text-slate-400 mt-10 font-bold italic text-sm uppercase tracking-[0.4em] border-l-4 border-blue-500 pl-8 ml-1">{months[currentMonth]} {currentYear}</p>
                                    </div>
                                    <div className="flex flex-col gap-5 w-full md:w-auto relative z-10">
                                        <button onClick={analyzeMonth} disabled={isAiLoading || filteredEntries.length === 0} className="bg-white text-[#0f0e32] hover:bg-slate-50 px-12 md:px-20 py-7 rounded-[3rem] font-black text-sm shadow-2xl transition-standard flex items-center justify-center gap-4 disabled:opacity-50 tracking-[0.2em] uppercase">
                                            {isAiLoading && <span className="animate-spin-custom w-5 h-5 border-2 border-[#0f0e32] border-t-transparent rounded-full"></span>}
                                            Analisis Bulanan
                                        </button>
                                        <button onClick={exportExcel} className="bg-[#2c2a7b] text-white hover:bg-[#232162] border border-white/10 px-12 md:px-20 py-7 rounded-[3rem] font-black text-sm shadow-2xl transition-standard uppercase tracking-[0.2em]">Unduh Laporan Excel</button>
                                    </div>
                                    <div className="absolute -bottom-32 -right-32 w-96 h-96 bg-[#2c2a7b] rounded-full blur-[100px] opacity-20"></div>
                                </div>
                                {aiAnalysis && (
                                    <div className="bg-white border-2 border-slate-100 rounded-[4rem] p-12 md:p-20 animate-in slide-in-from-top-6 relative text-[#0f0e32] leading-relaxed font-bold text-xl md:text-2xl italic shadow-lg border-l-[16px] border-l-[#2c2a7b]">
                                        <div className="mb-8 opacity-30 font-black uppercase text-xs tracking-[0.5em] italic">Executive Summary AI</div>
                                        "{aiAnalysis}"
                                        <button onClick={() => setAiAnalysis(null)} className="absolute top-10 right-16 text-slate-300 font-black uppercase text-[10px] hover:text-red-500 tracking-widest transition-colors">Tutup</button>
                                    </div>
                                )}
                                <div className="bg-white rounded-[4rem] shadow-2xl border border-slate-50 overflow-hidden">
                                    <div className="overflow-x-auto p-4 md:p-10">
                                        <table className="w-full text-left min-w-[900px]">
                                            <thead>
                                                <tr className="border-b-2 border-slate-50 bg-slate-50/50">
                                                    <th className="px-10 py-10 font-black uppercase text-slate-400 text-[11px] tracking-[0.4em]">Tanggal</th>
                                                    <th className="px-10 py-10 font-black uppercase text-slate-400 text-[11px] tracking-[0.4em]">Identitas Klien</th>
                                                    <th className="px-10 py-10 font-black uppercase text-slate-400 text-[11px] tracking-[0.4em]">Rekan</th>
                                                    <th className="px-10 py-10 font-black uppercase text-slate-400 text-[11px] tracking-[0.4em] text-right">Durasi</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {groupedEntries.map(([clientName, clientTasks]) => {
                                                    const clientTotal = clientTasks.reduce((sum, t) => sum + t.hours, 0);
                                                    return (
                                                        <React.Fragment key={clientName}>
                                                            <tr className="bg-slate-50/50 border-l-[16px] border-[#2c2a7b]">
                                                                <td colSpan="3" className="px-10 py-10 font-black text-[#0f0e32] uppercase tracking-tighter text-xl">{clientName}</td>
                                                                <td className="px-10 py-10 text-right font-black text-[#2c2a7b] text-2xl tracking-tighter italic">SUBTOTAL: {clientTotal.toFixed(1)}h</td>
                                                            </tr>
                                                            {clientTasks.map(e => (
                                                                <tr key={e.id} className="hover:bg-slate-50/30 transition-standard group">
                                                                    <td className="px-10 py-8 text-slate-400 font-mono text-[14px] font-bold group-hover:text-[#2c2a7b]">{e.date.split('-')[2]}/{e.date.split('-')[1]}</td>
                                                                    <td className="px-10 py-8"><div className="text-[15px] text-slate-600 font-bold leading-relaxed italic opacity-80">{e.task}</div></td>
                                                                    <td className="px-10 py-8 text-slate-400 text-[12px] font-black uppercase">{e.associates}</td>
                                                                    <td className="px-10 py-8 text-right font-black text-slate-900 text-2xl tracking-tighter">{e.hours.toFixed(1)}h</td>
                                                                </tr>
                                                            ))}
                                                        </React.Fragment>
                                                    );
                                                })}
                                            </tbody>
                                            <tfoot>
                                                <tr className="bg-[#0f0e32] text-white">
                                                    <td colSpan="3" className="px-10 py-16 text-right font-black uppercase text-[14px] tracking-[0.5em] opacity-40">Grand Total Bulan Ini</td>
                                                    <td className="px-10 py-16 text-right font-black text-white text-6xl tracking-tighter">{totalHours.toFixed(1)}h</td>
                                                </tr>
                                            </tfoot>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {modalMessage && (
                        <div className="fixed inset-0 bg-black/80 backdrop-blur-xl z-[1000] flex items-center justify-center p-6 text-center">
                            <div className="bg-white rounded-[4rem] p-16 max-w-md w-full shadow-2xl border border-slate-100 animate-in zoom-in duration-300">
                                <h4 className="font-black mb-6 text-[#0f0e32] text-3xl tracking-tighter uppercase italic">Info</h4>
                                <p className="text-slate-600 text-lg mb-12 leading-relaxed font-bold">{modalMessage}</p>
                                <button onClick={() => setModalMessage(null)} className="w-full bg-[#0f0e32] text-white font-black py-6 rounded-[2rem] uppercase tracking-widest shadow-2xl active:scale-95 transition-standard">Tutup</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
